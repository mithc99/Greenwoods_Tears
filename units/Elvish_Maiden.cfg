#textdomain wesnoth-Greenwoods_Tears

[unit_type]
    id=Elvish Maiden
    name= _ "female^Elvish Maiden"
    race=elf
    gender=female
    image="units/elvish-maiden.png"
    hitpoints=38
    movement_type=woodland
    [resistance]
        arcane=100
    [/resistance]
    movement=5
    {QUANTITY experience 80 90 100}
    level=2
    alignment=neutral
    advances_to=Elvish Heroine
    cost=35
    usage=healer
    die_sound={SOUND_LIST:ELF_FEMALE_HIT}
    {DEFENSE_ANIM_RANGE "units/elvish-maiden.png" "units/elvish-maiden.png" {SOUND_LIST:ELF_FEMALE_HIT} melee }
    {DEFENSE_ANIM_ELVEN_RANGE "units/elvish-maiden.png" "units/elvish-maiden.png" {SOUND_LIST:ELF_FEMALE_HIT} ranged }
    [abilities]
        {ABILITY_UNPOISON}
        {ABILITY_HEALS}
    [/abilities]
    [attack]
        name=staff
        #textdomain wesnoth-units
        description= _ "staff"
        icon=attacks/druidstaff.png
        type=impact
        range=melee
        damage=4
        number=2
    [/attack]
    [attack]
        name=lightning
        description= _ "lightning"
        type=fire
        range=ranged
        damage=8
        number=2
        [specials]
            {WEAPON_SPECIAL_CHARGE}
        [/specials]
    [/attack]
    [attack]
        name=faerie fire
        description= _ "faerie fire"
        #textdomain wesnoth-Greenwoods_Tears
        icon=attacks/faerie-fire.png
        type=arcane
        range=ranged
        damage=8
        number=3
        [specials]
            {WEAPON_SPECIAL_MAGICAL}
        [/specials]
    [/attack]
    [attack_anim]
        [filter_attack]
            name=faerie fire
        [/filter_attack]

        {MISSILE_FRAME_FAERIE_FIRE}

        start_time=-450
        [frame]
            image="units/elvish-maiden.png"
            halo=halo/elven/faerie-fire-halo[1~7].png:75
            halo_x,halo_y=0,-28
        [/frame]

        {SOUND:HIT_AND_MISS magic-faeriefire.ogg magic-faeriefire-miss.ogg -450}
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=staff
        [/filter_attack]

        start_time=-200
        [frame]
            image="units/elvish-maiden.png:300"
        [/frame]

        {SOUND:HIT_AND_MISS staff.ogg staff-miss.ogg -100}
    [/attack_anim]

#define ELVISH_MAIDEN_LIGHTNING DIRECTION_NUMBER
    [attack_anim]
        [filter_attack]
            name=lightning
        [/filter_attack]

        {LIGHTNING_BOLT {DIRECTION_NUMBER} }

        start_time=-300
        [frame]
            image="units/elvish-maiden.png"
            halo=halo/saurian-magic-halo-[1~7].png:75
            halo_x,halo_y=0,-28
        [/frame]

        {SOUND:HIT_AND_MISS lightning.ogg lightning-miss.ogg -300}
    [/attack_anim]
#enddef

    {ELVISH_MAIDEN_LIGHTNING 1}
    {ELVISH_MAIDEN_LIGHTNING 2}
    {ELVISH_MAIDEN_LIGHTNING 3}
[/unit_type]
