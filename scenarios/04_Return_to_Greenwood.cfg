#textdomain wesnoth-Greenwoods_Tears

[scenario]
    id=04_Return_to_Greenwood
    name= _ "Return to Greenwood"
    map_file=04_Return_to_Greenwood.map
    {TURNS 18 17 16}
    next_scenario=04x_The_Turmoil

    random_start_time=no
    allow_new_game=no
    force_lock_settings=yes

    victory_when_enemies_defeated=no

    {NORTHERN_SCHEDULE_DUSK}

    {CONTINUOUS_SCENARIO_MUSIC battle.ogg casualties_of_war.ogg}
    {EXTRA_SCENARIO_MUSIC the_city_falls.ogg}
    {EXTRA_SCENARIO_MUSIC weight_of_revenge.ogg}

    {GWT_DEATHS}

    [story]
        [part]
            story= _ "A few days after our strange alliance with the orcs, the entrance to the familiar forest came into sight as we advanced..."
            {GWT_BIGMAP}
            show_title=yes
        [/part]
    [/story]

    {GWT_TRACK {JOURNEY_04_NEW} }

    # wmllint: validate-off
    [side]
        side=1
        {PLAYABLE}

#ifdef MULTIPLAYER
        {GOLD 80 70 60}
#else
        {GOLD 140 120 100}
#endif

        # wmllint: recognize Arwen
        {CHARACTER_STATS_ARWEN}
    [/side]
    # wmllint: validate-on

    # wmllint: skip-side
    {MP_SIDE 2 (
        {PLAYABLE}

        {GOLD 80 70 60}

        # wmllint: recognize Grunk
        {CHARACTER_STATS_GRUNK}
    )}

    # wmllint: validate-off
    [side]
        side=3
        {UNPLAYABLE}
        team_name=undead
        user_team_name= _ "team_name^Undead"
        {FLAG_VARIANT undead}

        {GOLD 70 90 110}
        income=5
        recruit=Skeleton,Skeleton Archer,Ghost

        [ai]
            passive_leader=yes
            aggression=0.5
            recruitment_pattern=fighter,fighter,archer,scout
        [/ai]

        # wmllint: recognize Simone
        {CHARACTER_STATS_SIMONE}
        facing=ne

        {LOYAL_UNIT 3 (Ghost) 2 16} {FACING se} {GUARDIAN}
        {LOYAL_UNIT 3 (Ghost) 4 16} {FACING se} {GUARDIAN}
        {LOYAL_UNIT 3 (Ghost) 8 15} {FACING se} {GUARDIAN}

        {LOYAL_UNIT 3 (Death Squire) 7 16} {FACING se} {GUARDIAN}
        {LOYAL_UNIT 3 (Death Squire) 7 18} {FACING se} {GUARDIAN}
        {LOYAL_UNIT 3 (Death Squire) 9 17} {FACING se} {GUARDIAN}

        {LOYAL_UNIT 3 (Banebow) 12 18} {FACING se} {GUARDIAN}
    [/side]

    [side]
        side=4
        {UNPLAYABLE}
        team_name=player
        user_team_name= _ "team_name^Elves"
        {FLAG_VARIANT wood-elvish}

        {GOLD 130 120 110}
        recruit=Elvish Fighter,Elvish Archer,Elvish Scout

        [ai]
            passive_leader=yes
            grouping=no
            caution=0.6
            recruitment_pattern=fighter,archer,scout

            # Guard their prince
            [goal]
                name=protect_unit
                [criteria]
                    id=Arwen
                [/criteria]
                value=15
                protect_radius=10
            [/goal]
        [/ai]

        # wmllint: recognize Dowel
        {CHARACTER_STATS_DOWEL}
        facing=nw

        {GENERIC_UNIT 4 (Elvish Fighter) 34 13} {FACING nw}
        {GENERIC_UNIT 4 (Elvish Fighter) 35 14} {FACING nw}
    [/side]
    # wmllint: validate-on

    [side]
        side=5
        {UNPLAYABLE}
        team_name=undead
        user_team_name= _ "team_name^Undead"
        {FLAG_VARIANT undead}

        {GOLD 100 120 130}
        {INCOME 1 3 3}
        recruit=Skeleton,Skeleton Archer,Ghoul

        [ai]
            grouping=no
            aggression=0.8
            caution=0.2
            recruitment_pattern=fighter,archer,archer

            # Block the path to the goal
            # Without this, they might focus too much on Dowel's troops
            [goal]
                name=target
                [criteria]
                    id=Arwen
                [/criteria]
                value=10
            [/goal]
        [/ai]

        type=Ghast
        canrecruit=yes
        facing=se

        {GENERIC_UNIT 5 ({ON_DIFFICULTY (Ghost) (Wraith) (Wraith)}) 19 4} {FACING nw} {GUARDIAN}
        [+unit]
            upkeep=loyal
        [/unit]

        {GENERIC_UNIT 5 (Ghost) 18 5} {FACING sw}
        [+unit]
            upkeep=loyal
        [/unit]
        {GENERIC_UNIT 5 (Ghost) 17 6} {FACING sw}
        [+unit]
            upkeep=loyal
        [/unit]

#ifndef EASY
        {GENERIC_UNIT 5 (Deathblade) 23 6} {FACING nw}
        [+unit]
            upkeep=loyal
        [/unit]
#endif
        {GENERIC_UNIT 5 (Walking Corpse) 26 5} {FACING nw}
        {GENERIC_UNIT 5 (Walking Corpse) 27 5} {FACING se}
        {GENERIC_UNIT 5 (Walking Corpse) 27 6} {FACING se}

        # Treasure guard
        {LOYAL_UNIT 5 (Bone Shooter) 27 2} {FACING sw}
        [+unit]
            moves,max_moves=0,0
        [/unit]
    [/side]

    {STARTING_VILLAGES 3 8}
    {STARTING_VILLAGES 4 10}
    {STARTING_VILLAGES 5 7}

    [event]
        name=prestart

#ifndef MULTIPLAYER
        {RECALL_GRUNK 4 2}
#endif

        # wmllint: recognize Ellrea
        {RECALL_ELLREA 4 3}

        # Make it more precise that they are facing Greenwood
        {MODIFY_UNIT (side=1,2) facing se}

        {PLACE_IMAGE items/bones.png 9 16}
        {PLACE_IMAGE items/bones.png 25 5}

        {PLACE_IMAGE scenery/village-human-burned4.png 10 19}
        {PLACE_IMAGE scenery/village-human-burned3.png 23 6}

        {PLACE_IMAGE scenery/gore-4.png 6 14}
        {PLACE_IMAGE scenery/gore-4.png 5 16}
        {PLACE_IMAGE scenery/gore-4.png 27 5}

        [item]
            x,y=10,19
            halo=scenery/flames[01~15].png
        [/item]
        [item]
            x,y=28,3
            halo=scenery/flames[01~15].png
        [/item]
        [item]
            x,y=19,6
            halo=scenery/flames[01~15].png
        [/item]

        # Signpost indicating geography
        {PLACE_IMAGE scenery/signpost.png 18 8}

        # Treasures
        # TODO: Something more appealing?
        {PLACE_IMAGE items/gold-coins-medium.png 23 3}
        {SET_LABEL 23 3 ( _ "40 gold")}
        {PLACE_IMAGE items/gold-coins-medium.png 27 2}
        {SET_LABEL 27 2 ( _ "70 gold")}

        {VARIABLE treasure_take_count 0}

        [objectives]
            [objective]
                description= _ "Move Arwen to Dowel’s castle"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Arwen, Grunk, or Ellrea"
                condition=lose
            [/objective]
            [objective]
                description= _ "Death of Dowel"
                condition=lose
            [/objective]

            {TURNS_RUN_OUT}

            [gold_carryover]
                bonus=yes
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]
    [/event]

    # TODO: Dialogue overhaul

    [event]
        name=start
        [message]
            speaker=Ellrea
            message= _ "Our forest is surrounded by so many foes! Far more than when I first encountered them!"
        [/message]
        [message]
            speaker=Simone
            # po: Simone was once an elvish warrior.
            message= _ "So then, are you ready to die now, <i>friends</i>?"
        [/message]
        [message]
            speaker=Dowel
            message= _ "Men, we shall not allow these vile creatures to march any further into our motherland. They shall pay dearly for their wicked deeds... To arms once more!"
        [/message]
        [message]
            speaker=Ellrea
            message= _ "Captain Dowel! Are you in command yourself?"
        [/message]
        [message]
            speaker=Dowel
            message= _ "... Ellrea? Is it truly you? Ah, what a blessing! When you were cut off from the forest, we could not find a way to rescue you. I thought you were lost forever..."
        [/message]
        [message]
            speaker=Dowel
            message= _ "But why are you with those who are cloaked as thieves? Wait— Is that Prince Arwen standing next to you?!"
        [/message]
        [message]
            speaker=Grunk
            message= _ "Prince?"
        [/message]
        [message]
            speaker=Ellrea
            message= _ "What do you mean, sir?"
        [/message]
        [message]
            speaker=Arwen
            message= _ "Dowel, say no more about me. I am no longer your prince. I just... heard of the undead invasion from her... and came this far to make certain. What is going on here now?"
        [/message]
        [message]
            speaker=Dowel
            message= _ "We have suffered twin assaults from these undead legions. Now, they gather more corpses and filth, seeking to lay waste all our woods and villages! I cannot fathom where their desire to trample the peace of our Greenwood sprang. But we need your help, prince!"
            scroll=no
        [/message]
        [message]
            speaker=Arwen
            message= _ "I AM NO LONGER YOUR PRINCE!"
        [/message]
        [message]
            speaker=Grunk
            message= _ "Hey, calm yourself! I have no idea what’s the deal between you and that elf, but now is not the time to argue with him!"
        [/message]
        [message]
            speaker=Ellrea
            message= _ "But what should we do? They are storming the border even as we speak!"
        [/message]
        [message]
            speaker=Dowel
            message= _ "Of course, we will fight to repel them. Beyond that, however, we need to hold a council with you to end the very threat they pose. First, please enter this castle! We cannot discuss matters until your safety is ensured."
        [/message]
        [message]
            speaker=Arwen
            message= _ "Very... well..."
            scroll=no
        [/message]
    [/event]

    [event]
        name=side 3 turn 1
        [message]
            speaker=Simone
            message= _ "Lo, strange outlaws have joined those elves! We shall destroy them all for our master. Move on!"
        [/message]
    [/event]

    # Enemy continuous reinforcements
    [event]
        name=turn 6 end
        [message]
            speaker=Simone
            message= _ "Twilight falls once more... This is the end of wasting time. Summon reinforcements!"
        [/message]
    [/event]
    [event]
        name=turn 7,turn 9,Turn 11,turn 13,turn 15
        first_time_only=no
        [gold]
            side=3
            amount=25
        [/gold]
    [/event]

    # Simone will return in S6
    [event]
        name=attack end

        [filter_second]
            id=Simone
        [/filter_second]

        [message]
            speaker=Simone
            message= _ "Ha, ha, ha! Do you think you may bring me down? We shall meet again, mortal elves!"
        [/message]

        {MOVE_UNIT (id=Simone) 5 19}
        {MOVE_UNIT (id=Simone) 4 18}
        {MOVE_UNIT (id=Simone) 1 20}

        [kill]
            id=Simone
            fire_event=no
        [/kill]

        [redraw][/redraw]

        [message]
            speaker=unit
            message= _ "He got away!"
        [/message]

        [if]
            [have_unit]
                id=$unit.id
                side=1,2
            [/have_unit]
            [then]
                {ACHIEVE s04h} # Easter egg
            [/then]
        [/if]

        [message]
            speaker=Dowel
            message= _ "It will be too late once he returns. Make haste!"
        [/message]

        [scroll_to_unit]
            x,y=$x1,$y1
        [/scroll_to_unit]
    [/event]

    # When an orc nears the border...
    [event]
        name=moveto
        [filter]
            race=orc
            [filter_location]
                terrain=*^Qhh*
                radius=9
            [/filter_location]
        [/filter]

        [message]
            side,canrecruit=4,no
            message= _ "Argh! Not only the undead, but even orcs are encroaching upon the border!"
        [/message]
        [message]
            speaker=unit
            message= _ "Fool, there are no enemy orcs here! I came here following Chief Arwen."
        [/message]
        [message]
            speaker=Dowel
            message= _ "We have no choice but to trust them and gain their aid. If we fail to stop this wave of the undead, we are undone."
        [/message]
        [message]
            side,canrecruit=4,no
            message= _ "It’s quite irregular... but so be it."
        [/message]

        [scroll_to_unit]
            x,y=$x1,$y1
        [/scroll_to_unit]
    [/event]

    [event]
        name=moveto
        [filter]
            side=1,2
            x,y=18,8
        [/filter]

        [allow_undo][/allow_undo]

        [message]
            speaker=narrator
            message= _ "Welcome to West Greenwood"
            image=scenery/signpost.png
        [/message]
        [message]
            speaker=Arwen
            message= _ "Everything feels nostalgic... And yet, I wonder why I had to set foot in this forest again."
            scroll=no
        [/message]

        {ACHIEVE_PROGRESS wanderer 1 3}
        [floating_text]
            x,y=$x1,$y1
            text= _ "+1 signpost"
        [/floating_text]
    [/event]

    [event]
        name=moveto
        [filter]
            side=1,2
            x,y=23,3
        [/filter]

#ifdef MULTIPLAYER
        {LOOT 20 1}
        {LOOT 20 2}
#else
        {LOOT 40 1}
#endif

        {REMOVE_IMAGE $x1 $y1}
        {REMOVE_LABEL $x1 $y1}

        {VARIABLE_OP treasure_take_count add 1}

        [fire_event]
            name=check achievement
        [/fire_event]
    [/event]
    [event]
        name=moveto
        [filter]
            side=1,2
            x,y=27,2
        [/filter]

#ifdef MULTIPLAYER
        {LOOT 35 1}
        {LOOT 35 2}
#else
        {LOOT 70 1}
#endif

        {REMOVE_IMAGE $x1 $y1}
        {REMOVE_LABEL $x1 $y1}

        {VARIABLE_OP treasure_take_count add 1}

        [fire_event]
            name=check achievement
        [/fire_event]
    [/event]

    [event]
        name=check achievement
        [filter_condition]
            [variable]
                name=treasure_take_count
                numerical_equals=2
            [/variable]
        [/filter_condition]

        {ACHIEVE s04}
    [/event]

    [event]
        name=moveto
        [filter]
            id=Arwen
            [filter_adjacent]
                id=Dowel
            [/filter_adjacent]
        [/filter]

        [message]
            speaker=Simone
            message= _ "Ahh, we have squandered too much time and strength. We must retreat and rebuild our campaign!"
        [/message]
        [message]
            speaker=Dowel
            message= _ "It seems they have begun to retreat. However, I doubt this relentless wave of assaults will abate. At best, it will be but a fleeting respite."
        [/message]
        [message]
            speaker=Dowel
            message= _ "Prince, I shall bear you to the capital. Lord Roldur will surely rejoice to see you again."
        [/message]
        [message]
            speaker=Arwen
            message= _ "... Is my uncle in the capital? But... I have not truly returned to this land I once forsook... And what about our defenses here?"
        [/message]

        [role]
            role=supporter
            side=4
            canrecruit=no
            [else]
                [unit]
                    side=4
                    type=Elvish Fighter
                    role=supporter
                    placement=leader
                [/unit]
            [/else]
        [/role]

        [message]
            role=supporter
            message= _ "Leave it to us! We will fight with all our might to ensure our peace never perishes."
        [/message]

        # Simone's withdrawal
        [kill]
            id=Simone
            fire_event=no
        [/kill]

        [redraw][/redraw]

        [endlevel]
            result=victory
#ifdef MULTIPLAYER
            bonus=0.5
#else
            bonus=yes
#endif
            {NEW_GOLD_CARRYOVER 40}
        [/endlevel]
    [/event]

    [event]
        name=victory
        {CLEAR_VARIABLE treasure_take_count}
    [/event]

    [event]
        name=last breath
        [filter]
            id=Dowel
        [/filter]
        [message]
            speaker=Dowel
            message= _ "I have been... defeated. I could not shield Greenwood..."
        [/message]
        [message]
            speaker=Arwen
            message= _ "Dowel? No! Don’t die!"
        [/message]
        [message]
            speaker=Dowel
            message= _ "Prince, you’re too late..."
        [/message]

        [endlevel]
            result=defeat
        [/endlevel]
    [/event]

    [event]
        name=time over

        [if]
            [have_unit]
                id=Simone
            [/have_unit]
            [else]
                [unit]
                    side=3
                    {CHARACTER_STATS_SIMONE}
                    placement=leader
                    facing=ne
                [/unit]
            [/else]
        [/if]

        [message]
            speaker=Simone
            message= _ "Behold! Your doom has arrived!"
        [/message]

        [sound]
            name=magic-dark-big.ogg
        [/sound]

        {FLASH_BLUE ()}

        [message]
            speaker=Dowel
            message= _ "A dark energy is enveloping our forest... We may no longer stop them!"
        [/message]
    [/event]
[/scenario]
