            {UNDERGROUND}
        [/time_area]

#ifndef MULTIPLAYER
        {RECALL_GRUNK 3 20}
#endif

        # wmllint: recognize Ellrea
        {RECALL_ELLREA 4 19}

        {PLACE_IMAGE items/scarecrow.png 29 17}
        {PLACE_IMAGE items/scarecrow.png 25 12}
        {PLACE_IMAGE items/orcish-flag.png 28 14}
        {PLACE_IMAGE items/grain-sheaf.png 24 15}

        {PLACE_IMAGE items/bonestack.png 6 2}
        {PLACE_IMAGE items/bones.png 5 3}

        {PLACE_IMAGE scenery/rock4.png 21 10}
        {PLACE_IMAGE scenery/rock2.png 11 10}

        [objectives]
            [objective]
                description= _ "Defeat the undead leaders"
