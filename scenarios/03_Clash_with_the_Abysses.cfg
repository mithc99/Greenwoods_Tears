    [event]
        name=start
        [message]
            speaker=Grunk
            message= _ "I caught a familiar scent and just realized why. Over there at the keep, I can see a group of orcs! Arwen, I never imagined that I too would meet my former brethren..."
        [/message]
        [message]
            speaker="Eduol G'lem"
            # po: The Northern Alliance aided these orcs in the time of SotBE.
            message= _ "Halt there! Are you from the Northern Alliance? Or are you our enemies?"
        [/message]
        [message]
            speaker=Grunk
            message= _ "We have no business with the Alliance, nor are we your enemies. We are just passing through and are relieved to have at last found more of the living. What are you doing here?"
        [/message]
        [message]
            speaker=Nogho
            message= _ "This is the outpost that guards Prestim, and we are facing the undead head-on! Can’t you see the chaos in the north?!"
        [/message]

        {SCROLL_TO 21 3}
        {DELAY 1000}

        {SCROLL_TO 4 2}
        {DELAY 1000}

        [message]
            speaker=Grunk
            message= _ "How terrible! I didn't know that the undead had invaded here as well."
        [/message]
        [message]
            speaker="Eduol G'lem"
            # po: As mentioned in the intro, they have been invaded several times by the elves of the Silent Forest.
            # po: Of course, Kapou'e is the Son of the Black-Eye and their Great Cheif.
            message= _ "Wait, are you led by an elf? Do you dare invade our land and challenge the mighty Kapou’e once again?"
        [/message]
        [message]
            speaker=Arwen
            message= _ "Do we look like an organized army of elves to you? You've got to be joking, without a doubt, we are no more than thieves."
        [/message]
        [message]
            speaker=Ellrea
            message= _ "Are you saying that as a joke yourself...? I’m not one of these thieves, in any case!"
        [/message]
        [message]
            speaker=Nogho
            message= _ "Chief, it seems they have no intent to attack us."
        [/message]
        [message]
            speaker="Eduol G'lem"
            message= _ "Then, you thieves, choose this very moment: either depart <b>our</b> land forthwith, or side with us to crush the undead!"
        [/message]
        [message]
            speaker=Grunk
            message= _ "... Are those our only choices?"
            scroll=no
        [/message]
        [message]
            speaker="Eduol G'lem"
            message= _ "Aye, these are all we offer you. And if you dare to refuse, then we must add you to the ones we must face."
        [/message]
        [message]
            speaker=Arwen
            message= _ "Quite an intriguing proposal, but if we were to leave now, there's no safe path that we could take. Those undead are perilous for us both. We shall fight by your side against them here."
        [/message]
        [message]
            speaker=Ellrea
            message= _ "I have never heard of any elf allying with orcs... So, villain, will you rally their grunts as well and raid Greenwood? You’ll be dead before that comes to pass!"
        [/message]
        [message]
            speaker=Arwen
            message= _ "I'm curious to know what kind of misconceptions you have of me. Despite all of the claims you seem to be making about me, here you are still adventuring with us."
        [/message]
        [message]
            speaker=Ellrea
            message= _ "Because... I have no where else to go... And even if I sought to flee, everywhere was overrun with those dreadful undead, err..."
        [/message]
        [message]
            speaker=Arwen
            message={ASIDE ( _ "I wonder what Ellrea and Grunk's reactions would be if they found out who I used to be.")}
        [/message]
    [/event]

    [event]
        name=side 6 turn 1
        [message]
            speaker=MKSpirit
            message= _ "There are other undead facing the orcs besides us... Interesting. I shall report this to my master!"
        [/message]
    [/event]

    [event]
        name=turn 2
        [message]
            speaker=Arwen
            message= _ "Who are those undead peering out from the cave? They seem strange and do not appear to be allied with those that the orcs are facing. They might be a force unto themselves."
        [/message]
        [message]
            speaker=Ellrea
            message= _ "I feel potent magic emanating from them. It would be wise to keep a distance."
        [/message]
        [message]
            speaker=Arwen
            message= _ "Do you say such things out of concern for us?"
        [/message]
        [message]
            speaker=Ellrea
            message= _ "Are you messing with me?! Only because <i>I</i> want to survive!"
        [/message]
    [/event]

    [event]
        name=turn 3

        {QUAKE (rumble.ogg)}

        [message]
            speaker=Arwen
            message= _ "This rumbling... everyone, beware the cave. I have a bad feeling about this."
        [/message]
    [/event]

    [event]
        name=side 6 turn 3

        {SCROLL_TO 4 2}

        {INCIDENTAL_MUSIC ambuscade.ogg}

        {THUNDER (
            [unit]
                side=6
                {CHARACTER_STATS_MAL_KESHAR}
                overwrite=yes
                x,y=4,2
                facing=se
            [/unit]
        )}

        [allow_recruit]
            side=6
            type=Bone Shooter
        [/allow_recruit]

        [gold]
            side=6
            amount=75
        [/gold]

        [message]
            speaker=Mal Keshar
            message= _ "Ah, what a curious sight. Orcs and outlaws, and other poor souls — all banded together in the desolate field. I don't think I've ever seen such a league before..."
        [/message]

        [animate_unit]
            [filter]
                id=Mal Keshar
            [/filter]
            flag=attack
            hits=yes
            [primary_attack]
                name=chill tempest
            [/primary_attack]
            [facing]
                x,y=5,2
            [/facing]
        [/animate_unit]

        [redraw][/redraw]

        {QUAKE (rumble.ogg)}
        {QUAKE (rumble.ogg)}

        {DELAY 250}

        [message]
            speaker=Grunk
            message= _ "Blast it, a lich has appeared! Where did he come from?"
        [/message]
        [message]
            speaker="Eduol G'lem"
            message= _ "Evil lich, why invade our great city of Prestim? Killing us will only earn you the rage of our brethren and your own doom!"
        [/message]
        [message]
            speaker=Mal Keshar
            message= _ "Ha ha! You orcish scum, do you think I would find my soul’s peace in destroying one of your puny cities now? You could not be more mistaken. Although, I do yearn to purge every last one of your accursed species from the Great Continent forever."
        [/message]
        [message]
            speaker=Arwen
            message= _ "Answer me, lich. Are your minions the ones attacking us?"
        [/message]
        [message]
            speaker=Mal Keshar
            message= _ "What? An elvish thief allied with orcs? Now that makes for a strange tale..."
        [/message]
        [message]
            speaker=Mal Keshar
            message= _ "Elf, I must accomplish my goal of eradicating all the orcs, but the hour is not yet ripe. These undead are the creations of another necromancer, not me. I have merely sent a spirit to this base for fleeting reconnaissance. These beasts are spilling their blood without my knowledge, marching apace to their end."
        [/message]
        [message]
            speaker=Grunk
            message= _ "Then why are you still here? Vanish back into the darkness where you belong!"
        [/message]
        [message]
            speaker=Mal Keshar
            message= _ "Hold your tongue goblin, you're practically a miniature orc! Though this was not my original intention, it'll be a sweet delight to hear your miserable screams from here... Now then, why don’t you continue killing yourselves until none of you remain?"
        [/message]

        [modify_side]
            side=6
            user_team_name= _ "team_name^Mal Keshar"
        [/modify_side]
    [/event]

    [event]
        name=turn 4
        [message]
            speaker=Grunk
            message= _ "Arwen, it seems your foreboding was right. We can hold out for a time, but if that lich unleashes his full strength upon us, we will have no chance of victory!"
        [/message]
        [message]
            speaker=Arwen
            message= _ "We have no recourse but to lessen the number of foes we're fighting."
        [/message]

        [show_objectives][/show_objectives]
    [/event]

    # A couple of lines of foreshadowing
    [event]
        name=side 4 turn 4
        [message]
            speaker=Mal Keshar
            # wmllint: local spelling puppeteering
            message= _ "Hmmm, the power puppeteering them is not ordinary necromancy... It hails from a more faerie-like, mystical source."
            scroll=no
        [/message]
    [/event]
    [event]
        name=side 4 turn 8
        [message]
            speaker=Mal Keshar
            message= _ "I'm sure now, those magical pulses in the Far North I've been feeling were caused by them. But what could they be after?"
            scroll=no
        [/message]
    [/event]

    [event]
        name=die
        [filter]
            race=orc
        [/filter]
        # [filter_second]
        #     side=6
        # [/filter_second]
        [message]
            speaker=Mal Keshar
            message= _ "Yes! Grant me more of the orcs’ screams!"
            scroll=no
        [/message]
    [/event]

    # He should not be destroyed in this campaign
    [event]
        name=malin escapes
        [message]
            speaker=Mal Keshar
            message= _ "Elf, your foolish struggle has entertained me. So I shall give you a morsel of counsel! Behind those undead may lurk a being <i>darker</i> than you imagine. They are controlled by a magic unlike anything I know."
        [/message]
        [message]
            speaker=Mal Keshar
            message= _ "I, Mal Keshar, have spread numerous spies throughout the Northlands in preparation for the coming war against the orcs. A few years ago, I sensed a strange magic growing at the edge of the Mountains of Haag. Then, in the last year, I received a report of dark forces seeking contact with the Silent Forest. I am sure these events are some kind of omen."
        [/message]
        [message]
            speaker=Arwen
            message= _ "What do you mean?"
            scroll=no
        [/message]
        [message]
            speaker=Mal Keshar
            message= _ "Hm, why not figure it out yourself? If you want to live a long life, I would say to keep yourself far away from them. Let those orcs know that until I destroy them with my own hands, they had better enjoy their time in their miserable land, devouring the grime."
        [/message]
        [message]
            speaker=Arwen
            message= _ "You're fleeing, lich? Wait!"
            scroll=no
        [/message]

        {THUNDER (
            [kill]
                id=Mal Keshar
                fire_event=no
            [/kill]
        )}
    [/event]

    [event]
        name=attacker hits
        first_time_only=no

        [filter_second]
            id=Mal Keshar
            formula="self.hitpoints <= 30"
        [/filter_second]

        [message]
            speaker=Mal Keshar
            message= _ "Well, well, I’m amazed to see such reckless souls who challenge me... Perhaps I have spent a little too much time here."
        [/message]

        [fire_event]
            name=malin escapes
        [/fire_event]

        {VARIABLE_OP unit.experience add 32}
        [unstore_unit]
            variable=unit
        [/unstore_unit]

        {ACHIEVE s03}

        [message]
            speaker=Grunk
            message= _ "Argh, he got away... or did he let us go?"
            scroll=no
        [/message]
        [message]
            speaker=Arwen
            message= _ "His words give me concern. I hope they are merely prattle."
            scroll=no
        [/message]

        {HIGHLIGHT_IMAGE 4 2 items/sword-wraith.png ()}
        {OBJ_WRAITHBLADE 4 2}

        [message]
            speaker=narrator
            message= _ "Mal Keshar left something in the cave! Let’s check it out."
            image=wesnoth-icon.png
        [/message]
    [/event]

    [event]
        name=die
        first_time_only=no

        [filter]
            side=3,4
            canrecruit=yes
        [/filter]

        [if]
            [have_unit]
                side=3,4
                canrecruit=yes
            [/have_unit]
            [else]
                [if]
                    [have_unit]
                        id=Mal Keshar
                    [/have_unit]
                    [then]
                        [message]
                            speaker=Mal Keshar
                            message= _ "Perhaps I have spent a little too much time here."
                        [/message]

                        [fire_event]
                            name=malin escapes
                        [/fire_event]

                        [message]
                            speaker=Arwen
                            message= _ "... He's left. His words are troubling. But for now, not a single necromancer remains on the battlefield."
                            scroll=no
                        [/message]
                    [/then]
                [/if]

                [endlevel]
                    result=victory
#ifdef MULTIPLAYER
                    bonus=0.5
#else
                    bonus=yes
#endif
                    {NEW_GOLD_CARRYOVER 40}
                [/endlevel]
            [/else]
        [/if]
    [/event]

    [event]
        name=victory

        [message]
            speaker=Nogho
            message= _ "The undead have halted their advance and are retreating!"
        [/message]
        [message]
            speaker="Eduol G'lem"
            message= _ "Victory! We have stopped their incursion into Prestim. Brave thieves, we orcs honor your help. Truly, your deed is among the rarest I have witnessed."
        [/message]
        [message]
            speaker=Arwen
            message= _ "When I ran into you orcs, I wondered what would happen, but within your boldness lies true honor. Had even one of those foolish lords possessed a dram of your spirit, I might never have left my homeland."
        [/message]
        [message]
            speaker=Ellrea
            message= _ "Are you talking about Greenwood? Arwen—"
        [/message]
        [message]
            speaker="Eduol G'lem"
            message= _ "Ha ha, what an honest elf! I like you! Some fresh grunts, deeply moved by your leadership, wish to follow you. Could you train them under your command for a season?"
        [/message]
        [message]
            speaker=Arwen
            message= _ "Of course. We shall welcome them."
        [/message]

        [unit]
            side=1
            type=Orcish Grunt
            [modifications]
                {TRAIT_LOYAL}
                {TRAIT_STRONG}
            [/modifications]
            experience=30
            x,y=27,17
            facing=sw
        [/unit]
        [unit]
#ifdef MULTIPLAYER
            side=2
#else
            side=1
#endif
            type=Orcish Archer
            [modifications]
                {TRAIT_LOYAL}
                {TRAIT_INTELLIGENT}
            [/modifications]
            experience=16
            x,y=27,18
            facing=sw
        [/unit]
        [unit]
#ifdef MULTIPLAYER
            side=2
#else
            side=1
#endif
            type=Orcish Assassin
            [modifications]
                {TRAIT_LOYAL}
                {TRAIT_RESILIENT}
            [/modifications]
            experience=18
            x,y=28,17
            facing=sw
        [/unit]

        {SCROLL_TO 27 17}

        [message]
            speaker=narrator
            message= _ "Three loyal orcs have joined your band!"
            image=wesnoth-icon.png
        [/message]

        {DELAY 500}

        [message]
            speaker=Grunk
            message= _ "Arwen, this is more serious than I expected. Do you recall, before we reached here, all we saw were the bodies of slain people and charred-black villages. This is... a matter beyond whether or not you return to your homeland."
        [/message]
        [message]
            speaker="Eduol G'lem"
            message= _ "We too were taken aback by this invasion. If you are heading into a crisis, you are welcome to advance through our city."
        [/message]
        [message]
            speaker=Grunk
            message= _ "Are you sure, fellow kin? You know that we are outlaws right?"
        [/message]
        [message]
            speaker="Eduol G'lem"
            message= _ "Yes, but now you are also our allies! At least you are far more worthy of trust than smug human or elvish lords."
        [/message]
        [message]
            speaker=Ellrea
            message= _ "Somehow I feel like that may include me."
        [/message]
    [/event]

    [event]
        name=last breath
        [filter]
            id="Eduol G'lem"
        [/filter]
        [message]
            speaker=unit
            message= _ "Were your words about standing with us a lie? Thieves!"
        [/message]
    [/event]
    [event]
        name=die
        [filter]
            id="Eduol G'lem"
        [/filter]
        [message]
            speaker=Nogho
            message= _ "Our chief has fallen! The outpost has fallen! We are all likely to die now..."
        [/message]

        [endlevel]
            result=defeat
        [/endlevel]
    [/event]
[/scenario]

#undef AVOID_MALIN
