#textdomain wesnoth-Greenwoods_Tears

#define AVOID_MALIN SIDE
    [attacks]
        invalidate_on_gamestate_change=yes
        [filter_own]
            side={SIDE}
        [/filter_own]
        [filter_enemy]
            side=1,2,5
        [/filter_enemy]
    [/attacks]
#enddef

[scenario]
    id=03_Clash_with_the_Abysses
    name= _ "Clash with the Abysses"
    map_file=03_Clash_with_the_Abysses.map
    {TURNS 25 23 21}
    next_scenario=04_Return_to_Greenwood

    random_start_time=no
    allow_new_game=no
    force_lock_settings=yes

    victory_when_enemies_defeated=no

    {NORTHERN_SCHEDULE_MORNING}

    {INTRO_AND_SCENARIO_MUSIC elf-land.ogg northern_mountains.ogg}
    {EXTRA_SCENARIO_MUSIC loyalists.ogg}
    {EXTRA_SCENARIO_MUSIC the_city_falls.ogg}

    {GWT_DEATHS}

    [story]
        [part]
            story= _ "Yea... When once more my ears heard the name of my homeland, a place I had thought of as a relic of days long past, I recalled why this girl dwelt in my heart. She had once been a servant apprentice, working at our mansion. However, she was still young enough to be called a child, scarce able to perform any task well. That she, an orphan, was fortunate and taken in by us was nothing but my mother’s mercy."
        [/part]
        [part]
            story= _ "She and I were not familiar with each other’s faces. It was merely that, from time to time, I would observe her foolish errors from afar and find them passing merry. Such was the extent of our connection, and moreover, a junior servant like her hardly ever approached me, the prince."
        [/part]
        [part]
            story= _ "Prince. Heir to the proud lord of Greenwood. There was a time when I was called by such a grandiose title. Those memories, which I should have long since forsworn, seemed to wax against my will after meeting this girl again. I found myself thinking — though I would not fain accept it — that perhaps I still harbor love and hate for my own people, just as Grunk claimed. Or perhaps I had left something important behind in my homeland."
        [/part]
        [part]
            # po: In other words, he still hasn't been able to tell anyone that he was once of noble status.
            story= _ "After all, I told Grunk that I would return to my homeland just the once. If Greenwood is truly beset by an invasion, I have to make certain what I should do before all is lost. That was all I insisted on. I could not unfold much more. I knew it would sound most selfish to any other, and I was prepared for Grunk to get angry and bite me to death. Even so, after venting some spleen, he agreed to continue with me. Under one loose condition, though: once my business was settled, I should wrap everything up and get back on our journey."
            {GWT_BIGMAP}
        [/part]
        [part]
            story= _ "The first few days seemed to fare well, save for the girl who still mistrusted me, casting wary glances. But by degrees, we began to shiver in the foul air of the wasteland. The undead’s encroachment was beyond what we had foreseen. As we pressed on, the tokens of their slaughter, and their warriors themselves, sawed ever more manifest. To lessen our contact with them, we took two or three detours."
            {GWT_BIGMAP}
            show_title=yes
        [/part]
    [/story]

    {GWT_TRACK {JOURNEY_03_NEW} }

