    [event]
        name=start
        [message]
            speaker=Grunk
            message= _ "I caught a familiar scent and just realized why. Over there at the keep, I can see the orcs! Arwen, I never imagined that I too would meet my former brethren..."
        [/message]
        [message]
            speaker="Eduol G'lem"
            # po: The Northern Alliance aided these orcs in the time of SotBE.
            message= _ "Halt there! Are you from the Northern Alliance? Or are you our enemies?"
        [/message]
        [message]
            speaker=Grunk
            message= _ "We have no business with the Alliance, nor are we your enemies. We are just passing through and are relieved to have at last found some living ones. So what are you doing here?"
        [/message]
        [message]
            speaker=Nogho
            message= _ "This is the outpost that guards Prestim, and we are facing the undead head-on! Can’t you see the chaos in the north?!"
        [/message]

        {SCROLL_TO 21 3}
        {DELAY 1000}

        {SCROLL_TO 4 2}
        {DELAY 1000}

        [message]
            speaker=Grunk
            message= _ "How terrible! I knew not the undead had invaded even here."
        [/message]
        [message]
            speaker="Eduol G'lem"
            # po: As mentioned in the intro, they have been invaded several times by the elves of the Silent Forest.
            # po: Of course, Kapou'e is the son of the Black-Eye and their Great Cheif.
            message= _ "Wait, are you led by an elf? Dare you invade our land and challenge the mighty Kapou’e once again?"
        [/message]
        [message]
            speaker=Arwen
            message= _ "Do we look like an organized army of elves to your eyes? You must be joking. Without a doubt, we are no more than thieves."
        [/message]
        [message]
            speaker=Ellrea
            message= _ "Are you saying that as a form of self-irony...? I’m not one of you thieves, in any case!"
        [/message]
        [message]
            speaker=Nogho
            message= _ "Chief, it seems they have no intent to assail us."
        [/message]
        [message]
            speaker="Eduol G'lem"
            message= _ "Then, you thieves, choose this very moment: either depart <b>our</b> land forthwith, or side with us to crush the undead!"
        [/message]
        [message]
            speaker=Grunk
            message= _ "... Must we choose between those only?"
            scroll=no
        [/message]
        [message]
            speaker="Eduol G'lem"
            message= _ "Aye, these are all we offer you. And if you dare to refuse, then we must add you to the ones we must face."
        [/message]
        [message]
            speaker=Arwen
            message= _ "Quite an intriguing proposal, but if we depart here now, no safe path remains. Those undead are perilous for us both. We shall be standing with you in this fight for a time."
        [/message]
        [message]
            speaker=Ellrea
            message= _ "I have never heard of any alliance with the orcs... So, villain, will you rally even their grunts and raid Greenwood? You’ll be dead before that comes to pass!"
        [/message]
        [message]
            speaker=Arwen
            message= _ "It’s curious to imagine what kind of misconceptions you have of me. For making such a bold claim, however, it seems your attempts to slay me have borne no fruit at all, uh?"
        [/message]
        [message]
            speaker=Ellrea
            message= _ "Because... I have never slain anyone before... And even if I sought to flee, everywhere was overrun with those dreadful undead, err..."
        [/message]
        [message]
            speaker=Arwen
            message={ASIDE ( _ "It would be funny if she or Grunk found out what I really was.")}
        [/message]
    [/event]

    [event]
        name=side 6 turn 1
        [message]
            speaker=MKSpirit
            message= _ "There are other ranks facing the orcs besides us... Interesting. I shall report to my master!"
        [/message]
    [/event]

    [event]
        name=turn 2
        [message]
            speaker=Arwen
            message= _ "Who are those undead peering out from the cave? They seem strange and do not appear to be allied with those that are encamped. They might be a force unto themselves."
        [/message]
        [message]
            speaker=Ellrea
            message= _ "I feel potent magic emanating from them. It would be wise to keep a distance."
        [/message]
        [message]
            speaker=Arwen
            message= _ "Do you say such things out of concern for us?"
        [/message]
        [message]
            speaker=Ellrea
            message= _ "Are you messing with me?! Only because <b>I</b> want to survive!"
        [/message]
    [/event]

    [event]
        name=turn 3

        {QUAKE (rumble.ogg)}

        [message]
            speaker=Arwen
            message= _ "This rumbling... all, beware the cave. I have a foreboding."
        [/message]
    [/event]

    [event]
        name=side 6 turn 3

        {SCROLL_TO 4 2}

        {INCIDENTAL_MUSIC ambuscade.ogg}

        {THUNDER (
            [unit]
                side=6
                {CHARACTER_STATS_MAL_KESHAR}
                overwrite=yes
                x,y=4,2
                facing=se
            [/unit]
        )}

        [allow_recruit]
            side=6
            type=Bone Shooter
        [/allow_recruit]

        [gold]
            side=6
            amount=75
        [/gold]

        [message]
            speaker=Mal Keshar
            message= _ "Ah, what a curious sight. Orcs and outlaws, and other poor souls — all banded together in the desolate field. Had I ever seen such a league before..."
        [/message]

        [animate_unit]
            [filter]
                id=Mal Keshar
            [/filter]
            flag=attack
            hits=yes
            [primary_attack]
                name=chill tempest
            [/primary_attack]
            [facing]
                x,y=5,2
            [/facing]
        [/animate_unit]

        [redraw][/redraw]

        {QUAKE (rumble.ogg)}
        {QUAKE (rumble.ogg)}

        {DELAY 250}

        [message]
            speaker=Grunk
            message= _ "Blast it, the lich has appeared! Where did he come from?"
        [/message]
        [message]
            speaker="Eduol G'lem"
            message= _ "Evil sorcerer, why invade our great city of Prestim? Killing us will only earn you the rage of our brethren and your own doom!"
        [/message]
        [message]
            speaker=Mal Keshar
            message= _ "Ha ha! You orcish scum, do you think I would find my soul’s peace in destroying one of your <i>puny</i> cities now? You could not be more mistaken. I do yearn to purge every last one of your accursed species from the Great Continent forever."
        [/message]
        [message]
            speaker=Arwen
            message= _ "Answer me, lich. Are your minions the ones attacking us?"
        [/message]
        [message]
            speaker=Mal Keshar
            message= _ "What? An elvish thief allied with orcs? That’s a strange tale..."
        [/message]
        [message]
            speaker=Mal Keshar
            message= _ "Elf, I must accomplish my cause against the orcs, but the hour is not yet ripe. They are the creations of another necromancer, not me. I have merely sent a spirit to this base for fleeting reconnaissance. These beasts are spilling their blood without my knowledge, marching apace to their end."
        [/message]
        [message]
            speaker=Grunk
            message= _ "Then why are you still here? Vanish back into the darkness you belonged to!"
        [/message]
        [message]
            speaker=Mal Keshar
            message= _ "Hold your tongue, goblin, a miniature orc! Though this was not woven into my design, to hear your miserable screams from here is indeed a sweet delight... Now then, why don’t you continue killing yourselves until none of you remain?"
        [/message]

        [modify_side]
            side=6
            user_team_name= _ "team_name^Mal Keshar"
        [/modify_side]
    [/event]

    [event]
        name=turn 4
        [message]
            speaker=Grunk
            message= _ "Arwen, it seems your foreboding was right. We can hold out for a time, but if that lich unleashes his full strength upon us, we will have no chance of victory!"
        [/message]
        [message]
            speaker=Arwen
            message= _ "We have no recourse but to lessen the number of foes we can surely defeat."
        [/message]

        [show_objectives][/show_objectives]
    [/event]

    [event]
        name=side 4 turn 4
        [message]
            speaker=Mal Keshar
            # wmllint: local spelling puppeteering
            message= _ "Hmmm, the power puppeteering them is not ordinary black magic... It hails from a more faerie-like, mystical source."
            scroll=no
        [/message]
    [/event]

    [event]
        name=die
        [filter]
            race=orc
        [/filter]
        # [filter_second]
        #     side=6
        # [/filter_second]
        [message]
            speaker=Mal Keshar
            message= _ "Yes! Grant me more of the orcs’ screams!"
            scroll=no
        [/message]
    [/event]

    # He should not be destroyed in this campaign
    [event]
        name=malin escapes
        [message]
            speaker=Mal Keshar
            message= _ "Elf, your foolish struggle has not been so bad for me. So I shall give you a morsel of counsel! Behind those undead may lurk a being <i>darker</i> than you imagine. They are mastered by a magic somewhat unlike from what I know."
        [/message]
        [message]
            speaker=Arwen
            message= _ "What do you mean?"
            scroll=no
        [/message]
        [message]
            speaker=Mal Keshar
            message= _ "Hm, why not figure it out yourself? If you would live long, I will but say to keep yourself far away from them. And yes, bid those orcs know that until I destroy them with my own hands, they would best bide in their miserable land, devouring the grime."
        [/message]
        [message]
            speaker=Arwen
            message= _ "Fleeing, lich? Wait!"
            scroll=no
        [/message]

        {THUNDER (
            [kill]
                id=Mal Keshar
                fire_event=no
            [/kill]
        )}
    [/event]

    [event]
        name=attacker hits
        first_time_only=no

        [filter_second]
            id=Mal Keshar
            formula="self.hitpoints <= 30"
        [/filter_second]

        [message]
            speaker=Mal Keshar
            message= _ "Well, well, I’m amazed to see such reckless souls who challenge me... Perhaps I have spent a little too much time here."
        [/message]

        [fire_event]
            name=malin escapes
        [/fire_event]

        {VARIABLE_OP unit.experience add 32}
        [unstore_unit]
            variable=unit
        [/unstore_unit]

        {ACHIEVE s03}

        [message]
            speaker=Grunk
            message= _ "Argh, he got away... or did he let us go?"
            scroll=no
        [/message]
        [message]
            speaker=Arwen
            message= _ "His words are giving me concern. I hope they are merely prattle."
            scroll=no
        [/message]

        {HIGHLIGHT_IMAGE 4 2 items/sword-wraith.png ()}
        {OBJ_WRAITHBLADE 4 2}

        [message]
            speaker=narrator
            message= _ "Mal Keshar left something in the cave! Let’s check it out."
            image=wesnoth-icon.png
        [/message]
    [/event]

    [event]
        name=die
        first_time_only=no

        [filter]
            side=3,4
            canrecruit=yes
        [/filter]

        [if]
            [have_unit]
                side=3,4
                canrecruit=yes
            [/have_unit]
            [else]
                [if]
                    [have_unit]
                        id=Mal Keshar
                    [/have_unit]
                    [then]
                        [message]
                            speaker=Mal Keshar
                            message= _ "Perhaps I have spent a little too much time here."
                        [/message]

                        [fire_event]
                            name=malin escapes
                        [/fire_event]

                        [message]
                            speaker=Arwen
                            message= _ "... He’s left. His words are troubling. But for now, not a single undead leader remains in the land."
                            scroll=no
                        [/message]
                    [/then]
                [/if]

                [endlevel]
                    result=victory
#ifdef MULTIPLAYER
                    bonus=0.5
#else
                    bonus=yes
#endif
                    {NEW_GOLD_CARRYOVER 40}
                [/endlevel]
            [/else]
        [/if]
    [/event]

    [event]
        name=victory

        [message]
            speaker=Nogho
            message= _ "The undead have halted their advance and are retreating!"
        [/message]
        [message]
            speaker="Eduol G'lem"
            message= _ "Our victory! We stopped their incursion into Prestim. Brave thieves, we orcs honor your help. Truly, your deed is among the rarest I have witnessed."
        [/message]
        [message]
            speaker=Arwen
            message= _ "When I ran into you orcs, I wondered what would happen — but within your boldness lies true chivalry. Had even one of those foolish lords possessed a dram of your spirit, I might never have left my homeland."
        [/message]
        [message]
            speaker=Ellrea
            message= _ "Are you talking about our forest! Arwen—"
        [/message]
        [message]
            speaker="Eduol G'lem"
            message= _ "Ha ha, what an honest elf! I like you! Some young soldiers, deeply moved by your fight, wish to follow you. Could you train them under your command for a season?"
        [/message]
        [message]
            speaker=Arwen
            message= _ "Of course. We shall welcome them."
        [/message]

        [unit]
            side=1
            type=Orcish Grunt
            [modifications]
                {TRAIT_LOYAL}
                {TRAIT_STRONG}
            [/modifications]
            experience=30
            x,y=27,17
            facing=sw
        [/unit]
        [unit]
#ifdef MULTIPLAYER
            side=2
#else
            side=1
#endif
            type=Orcish Archer
            [modifications]
                {TRAIT_LOYAL}
                {TRAIT_INTELLIGENT}
            [/modifications]
            experience=16
            x,y=27,18
            facing=sw
        [/unit]
        [unit]
#ifdef MULTIPLAYER
            side=2
#else
            side=1
#endif
            type=Orcish Assassin
            [modifications]
                {TRAIT_LOYAL}
                {TRAIT_RESILIENT}
            [/modifications]
            experience=18
            x,y=28,17
            facing=sw
        [/unit]

        {SCROLL_TO 27 17}

        [message]
            speaker=narrator
            message= _ "Three loyal orcs have joined your band!"
            image=wesnoth-icon.png
        [/message]

        {DELAY 500}

        [message]
            speaker=Grunk
            message= _ "However, Arwen, this is more serious than I expected. Do you recall? Before we reached here, all we saw were the bodies of slain dwellers and charred-black villages. This is a matter beyond whether or not you return to your homeland."
        [/message]
        [message]
            speaker="Eduol G'lem"
            message= _ "We too were taken aback by this invasion. If you are heading into a crisis, you are welcome to advance through our city."
        [/message]
        [message]
            speaker=Grunk
            message= _ "Are you sure, old friend? You know we are outlaws?"
        [/message]
        [message]
            speaker="Eduol G'lem"
            message= _ "But now you are our allies! At least you are far more worthy of trust than smug men or elvish lords."
        [/message]
        [message]
            speaker=Ellrea
            message= _ "... Aww... I feel kind of dishonored..."
        [/message]
    [/event]

    [event]
        name=last breath
        [filter]
            id="Eduol G'lem"
        [/filter]
        [message]
            speaker=unit
            message= _ "Were your words about standing with us a lie? Thieves!"
