#textdomain wesnoth-Greenwoods_Tears

[scenario]
    id=02_High_Pass
    name= _ "High Pass"
    map_file=02_High_Pass.map
    {TURNS 22 20 18}
    next_scenario=03_Clash_with_the_Abysses

    random_start_time=no
    allow_new_game=no
    force_lock_settings=yes

    victory_when_enemies_defeated=no

    {NORTHERN_SCHEDULE_FIRST_WATCH}

    {CONTINUOUS_SCENARIO_MUSIC wanderer.ogg nunc_dimittis.ogg}
    {EXTRA_SCENARIO_MUSIC knolls.ogg}
    {EXTRA_SCENARIO_MUSIC northern_mountains.ogg}

    {GWT_DEATHS}

    {GWT_TRACK {JOURNEY_02_NEW} }

    # wmllint: validate-off
    [side]
        side=1
        {PLAYABLE}

#ifdef MULTIPLAYER
        {GOLD 90 80 70}
#else
        {GOLD 160 140 120}
#endif
        fog=yes
        shroud=yes

        # wmllint: recognize Arwen
        {CHARACTER_STATS_ARWEN}
    [/side]
    # wmllint: validate-on

    # wmllint: skip-side
    {MP_SIDE 2 (
        {PLAYABLE}

        {GOLD 90 80 70}
        fog=yes
        shroud=yes

        # wmllint: recognize Grunk
        {CHARACTER_STATS_GRUNK}
    )}

    [side]
        side=3
        {UNPLAYABLE}
        team_name=dwarves
        user_team_name= _ "team_name^Dwarves"
        {FLAG_VARIANT knalgan}

        {GOLD 50 70 90}
        recruit=Dwarvish Thunderer,Dwarvish Scout

        [ai]
            aggression=0.6
            caution=0.2
            village_value=0
        [/ai]

        type=Dwarvish Pathfinder
        id=Wolrack
        name= _ "Wolrack"
        canrecruit=yes
        facing=se
    [/side]
    {LIMIT_CONTEMPORANEOUS_RECRUITS 3 (Dwarvish Thunderer) 1}

    [side]
        side=4
        {UNPLAYABLE}
        team_name=undead
        user_team_name= _ "team_name^Undead"
        {FLAG_VARIANT undead}

        {GOLD 10 30 50}
        {INCOME 1 3 5}
        recruit=Walking Corpse,Skeleton,Skeleton Archer

        [ai]
            passive_leader=yes
            aggression=0.8
            recruitment_pattern=fighter,archer

            [goal]
                name=target
                [criteria]
                    id=Arwen
                [/criteria]
                value=5
            [/goal]
        [/ai]

        type=Bone Shooter
        id=Lal-Gwërg
        name= _ "Lal-Gwërg"
        canrecruit=yes
        facing=sw

        [modifications]
            {TRAIT_DEXTROUS}
        [/modifications]

        {LOYAL_UNIT 4 (Skeleton Archer) 23 2}
        {LOYAL_UNIT 4 (Skeleton Archer) 23 3}
    [/side]

    [side]
        side=5
        {UNPLAYABLE}
        team_name=bats
        user_team_name= _ "team_name^Wild Bats"
        hidden=yes
        no_leader=yes
    [/side]

    {STARTING_VILLAGES 1 4}
#ifdef MULTIPLAYER
    {STARTING_VILLAGES 2 3}
#endif
    {STARTING_VILLAGES 3 5}
    {STARTING_VILLAGES 4 5}

    {AMBIENT_CAMPFIRE 7 9}

    [event]
        name=prestart

#ifndef MULTIPLAYER
        {RECALL_GRUNK 11 23}
#endif

        {PLACE_IMAGE items/bones.png 26 3}
        {PLACE_IMAGE items/bones.png 21 3}

        # Initialize variables
        {VARIABLE bat_retrieval_count 0}
        {VARIABLE found_dwarves no}

        [objectives]
            [objective]
                description= _ "Move Arwen to the eastern signpost (30,10)"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Arwen, Grunk, or Ellrea"
                condition=lose
            [/objective]

            {TURNS_RUN_OUT}

            [note]
                description= _ "Arrange your units strategically so they can move quickly."
            [/note]

            [gold_carryover]
                bonus=yes
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]
    [/event]

    [event]
        name=start
        [message]
            speaker=Grunk
            message= _ "Hey Arwen, how long do you intend to haul this elf around? There's nowhere we can go with a girl like this trailing at our heels!"
        [/message]
        [message]
            speaker=Arwen
            message= _ "I cannot say with certainty."
        [/message]
        [message]
            speaker=Grunk
            # po: He is irritated, but he has no intention of blaming Arwen that much.
            message= _ "Cease your jokes. Are you actually unable to cast aside your attachment for your own people? I bet you’re just happy to see a woman of your race after so long, huh?"
        [/message]
        [message]
            speaker=Arwen
            message= _ "Assuredly not! I could get rid of her at once, whenever I please. I just want to get rid of my doubts concerning her. Somehow, I feel like I know her... You cannot grasp how this feels."
        [/message]
        [message]
            speaker=Grunk
            message= _ "Bah! You've never really tried to tell me much of anything about your homeland. How can you expect me to understand now?"
        [/message]
        [message]
            speaker=Arwen
            message= _ "Hmmm..."
        [/message]
        [message]
            speaker=Grunk
            message= _ "Well, if that's how you feel, then I'll let it go for now, but at least keep an eye on her so she doesn't end up getting in our way."
        [/message]

        [unit]
            side=1
            # wmllint: recognize Ellrea
            {CHARACTER_STATS_ELLREA}
            x,y=11,22
            facing=sw
            animate=yes
        [/unit]

        [message]
            speaker=Ellrea
            message= _ "Where am I... NO! When was I stolen away?!"
        [/message]
        [message]
            speaker=Grunk
            message= _ "‘Stolen’? We <i>saved</i> your life!"
        [/message]
        [message]
            speaker=Ellrea
            message= _ "I will not be fooled. I know you’re one of those bandits who captured me and sought to sell me into bondage. What are you trying to deceive me into doing next?"
        [/message]
        [message]
            speaker=Grunk
            message= _ "Eh, Arwen, maybe this elf should be thrown to our wolves after all."
        [/message]
        [message]
            speaker=Arwen
            message= _ "Hold on, Grunk. Young maiden, where on earth did you come from? I have a question I would ask you."
        [/message]
        [message]
            speaker=Ellrea
            message= _ "Why should I tell you? Villain!"
        [/message]
        [message]
            speaker=Arwen
            message= _ "Because the fact is, we saved you, and now you’re safely standing here."
        [/message]
        [message]
            speaker=Ellrea
            message= _ "However—"
        [/message]
        [message]
            speaker=Arwen
            message= _ "A virtuous elf prizes gratitude and courtesy, no?"
        [/message]

        {DELAY 250}

        [message]
            speaker=Ellrea
            # po: Although she is still distrustful, she lets slip a little under the influence of Arwen's words.
            message= _ "Hmm, er... I... I am Ellrea, and I fled from the undead who attacked our forest. I should have sought help, but I was beset upon by those savages, and then..."
        [/message]
        [message]
            speaker=Arwen
            message= _ "Where is your forest?"
        [/message]
        [message]
            speaker=Ellrea
            message= _ "... I will talk to you no more, for you’re unworthy of trust. You’re the first elf I have seen commit the crime of thievery!"
        [/message]
        [message]
            speaker=Arwen
            message= _ "Do as you want. But if you want to stay alive, you'll have to come with me and Grunk. This is the wasteland right between the Dorth and Heart Mountains; no place for a weakling like you to stray alone."
        [/message]
        [message]
            speaker=Grunk
            message= _ "And to make matters worse, it seems snow and heavy mist have taken hold here. This may not have been the wisest choice of place for our camp."
        [/message]
        [message]
            speaker=Arwen
            message= _ "Then let us depart from here with haste."
        [/message]
        [message]
            speaker=Ellrea
            message={ASIDE ( _ "Aww, I feel like things are getting strange...")}
        [/message]

        [remove_shroud]
            side=1,2
            x,y,radius=30,10,1
        [/remove_shroud]

        {HIGHLIGHT_IMAGE 30 10 scenery/signpost.png ()}
    [/event]

    [event]
        name=turn 2
        [message]
            speaker=Grunk
            message= _ "Hey, don’t you smell something foul in the air? Like something rotten..."
        [/message]
        [message]
            speaker=Ellrea
            message= _ "I guess it’s not from the scary wolf you’re riding?"
        [/message]
        [message]
            speaker=Grunk
            message= _ "... Girl, I really will have my wolf bite you if you stay so impertinent."
        [/message]
    [/event]

    [event]
        name=side 4 turn 5
        [gold]
            side=4
            amount=30
        [/gold]
    [/event]

    [event]
        name=sighted
        [filter]
            side=3
        [/filter]
        [filter_second]
            side=1,2
        [/filter_second]

        [remove_shroud]
            side=1,2
            x,y,radius=$x1,$y1,1
        [/remove_shroud]
        {CLEAR_FOG (1,2) $x1 $y1 1}

        [scroll_to_unit]
            x,y=$x1,$y1
        [/scroll_to_unit]

        {DELAY 750}

        [message]
            speaker=Grunk
            message= _ "There are dwarves in this wasteland!"
            scroll=no
        [/message]
        [message]
            speaker=Arwen
            message= _ "How long has it been since I last saw these gold-craving misers. What are they doing here in this freezing cold?"
        [/message]

        [remove_shroud]
            side=1,2
            x,y,radius=3,6,2
        [/remove_shroud]
        {CLEAR_FOG (1,2) 3 6 2}

        [message]
            speaker=Wolrack
            message= _ "Oi, an elf leading outlaws? That’s strange. We are cleaving the filth that has invaded this valley with our axes. But now, we have even more to slay."
        [/message]
        [message]
            speaker=Arwen
            message= _ "We only wish to pass through here, nothing else. We don't have the time to play with you, nor do we have any interest in your paltry gems."
        [/message]
        [message]
            speaker=Wolrack
            message= _ "How like an elf, such arrogance! Have you ever pondered how many of our kinfolk your race has betrayed with that guile? Die, wan elf!"
        [/message]
        [message]
            speaker=Grunk
            message= _ "Does he hold a grudge against the elves?"
        [/message]
        [message]
            speaker=Arwen
            # po: Having met dwarves during his time as the heir, Arwen knew their nature.
            message= _ "Dwarves are all like this. I didn't intend for us to do any jobs here, but we may as well seize some wealth from them if they want a fight."
        [/message]
        [message]
            speaker=Ellrea
            message= _ "Wait, no! Don't kill them!"
        [/message]
        [message]
            speaker=Arwen
            message= _ "We have no choice, they mean to slay us all."
        [/message]
        [message]
            speaker=Wolrack
            message= _ "What are you babbling about! Whatever you’re scheming is useless!"
        [/message]

        {VARIABLE found_dwarves yes}
    [/event]

    [event]
        name=attack
        [filter]
            id=Ellrea
        [/filter]
        [filter_second]
            side=3
        [/filter_second]

        [message]
            speaker=unit
            message= _ "I hate this... Wounding a living being... I've never had to do this before."
        [/message]
        [message]
            speaker=Arwen
            message= _ "Stop your complaining and defend yourself, you spoiled girl."
            scroll=no
        [/message]
    [/event]

    [event]
        name=sighted
        [filter]
            race=undead
        [/filter]
        [filter_second]
            side=1,2
        [/filter_second]

        [remove_shroud]
            side=1,2
            x,y,radius=$x1,$y1,1
        [/remove_shroud]
        {CLEAR_FOG (1,2) $x1 $y1 1}

        [scroll_to_unit]
            x,y=$x1,$y1
        [/scroll_to_unit]

        {DELAY 1000}

        [if]
            [variable]
                name=found_dwarves
                boolean_equals=yes
            [/variable]
            [then]
                [message]
                    speaker=Grunk
                    message= _ "Argh, there are the undead! So the dwarves were fighting them after all."
                    scroll=no
                [/message]
            [/then]
            [else]
                [message]
                    speaker=Grunk
                    message= _ "Argh, there are the undead! No wonder the air smelled that foul."
                    scroll=no
                [/message]
            [/else]
        [/if]

        [message]
            speaker=Ellrea
            message= _ "They possess the same eyes as those who attacked Greenwood..."
        [/message]
        [message]
            speaker=Arwen
            message= _ "Did you just say Greenwood?"
        [/message]
        [message]
            speaker=Ellrea
            message= _ "Err... I meant..."
        [/message]
        [message]
            speaker=Arwen
            message= _ "That’s enough, hold your tongue."
        [/message]

        [scroll_to_unit]
            x,y=$x1,$y1
        [/scroll_to_unit]
    [/event]

    [event]
        name=attack
        [filter]
            id=Ellrea
        [/filter]
        [filter_second]
            race=undead
        [/filter_second]
        [message]
            speaker=unit
            message= _ "STAY AWAY, foul creature!"
        [/message]
    [/event]

    [event]
        name=last breath
        [filter]
            id=Wolrack
        [/filter]
        [filter_second]
            side=1,2
        [/filter_second]
        [message]
            speaker=unit
            message= _ "The evil elf and his band killed me! Our valley is done for..."
        [/message]
    [/event]
    [event]
        name=last breath
        [filter]
            id=Lal-Gwërg
        [/filter]
        [message]
            speaker=Arwen
            message= _ "Where did these undead come from? Not even a trace of a necromancer can be seen, yet they appear to have slain almost every inhabitant here before we showed up."
        [/message]

        [scroll_to_unit]
            x,y=$x1,$y1
        [/scroll_to_unit]
    [/event]

    [event]
        name=capture
        first_time_only=no

        [filter]
            side=1,2
            [filter_location]
                terrain=*^Vu
            [/filter_location]
        [/filter]

        # Bat retrieval handler
        # The first two are friendly, but the last one must be defeated once to be joined

        [switch]
            variable=bat_retrieval_count
            [case]
                value=0
                {LOYAL_UNIT $unit.side (Vampire Bat) $unit.x $unit.y} {FACING se}
                [+unit]
                    moves,resting=0,no
                    [modifications]
                        {TRAIT_HEALTHY}
                    [/modifications]
                [/unit]

                [message]
                    speaker=unit
                    message= _ "A wild bat was hiding here, it looks quite tough!"
                [/message]
            [/case]
            [case]
                value=1
                {LOYAL_UNIT $unit.side (Blood Bat) $unit.x $unit.y} {FACING se}
                [+unit]
                    moves,resting=0,no
                    [modifications]
                        {TRAIT_INTELLIGENT}
                    [/modifications]
                [/unit]

                [message]
                    speaker=Arwen
                    message= _ "These bats here are quite friendly with us and wise, too."
                    scroll=no
                [/message]
            [/case]
            [case]
                value=2
                {LOYAL_UNIT 5 (Dread Bat) $unit.x $unit.y} {FACING se}
                [+unit]
                    moves,hitpoints=2,18
                    [modifications]
                        {TRAIT_STRONG}
                    [/modifications]
                [/unit]

                [message]
                    speaker=narrator
                    message= _ "You found another bat, but he charged at you!"
                    image=wesnoth-icon.png
                [/message]
                [message]
                    speaker=Grunk
                    message= _ "We must defeat him and show him how powerful we are!"
                    scroll=no
                [/message]
            [/case]
        [/switch]

        [redraw]
            clear_shroud=yes
        [/redraw]

        {VARIABLE_OP bat_retrieval_count add 1}
    [/event]

    [event]
        name=last breath
        [filter]
            side=5
            type=Dread Bat
        [/filter]
        [filter_second]
            side=1,2
        [/filter_second]

        {FULL_HEAL (id=$unit.id)}

        {MODIFY_UNIT (id=$unit.id) side $second_unit.side}

        [redraw]
            clear_shroud=yes
        [/redraw]

        [message]
            speaker=second_unit
            message= _ "He seems to have accepted us! Now he’s flying alongside us."
        [/message]

        {ACHIEVE s02}
    [/event]

    [event]
        name=moveto
        [filter]
            id=Arwen
            x,y=30,10
        [/filter]

        [message]
            speaker=Arwen
            message= _ "Finally, we have reached the end of the mountain pass."
        [/message]

        {ACHIEVE_PROGRESS wanderer 1 2}
        [floating_text]
            x,y=$x1,$y1
            text= _ "+1 signpost"
        [/floating_text]

        {DELAY 500}

        [endlevel]
            result=victory
#ifdef MULTIPLAYER
            bonus=0.5
#else
            bonus=yes
#endif
            {NEW_GOLD_CARRYOVER 40}
        [/endlevel]
    [/event]

    [event]
        name=victory

        {CLEAR_VARIABLE bat_retrieval_count,found_dwarves}

        [message]
            speaker=Grunk
            message= _ "So what now, Arwen?"
        [/message]
        [message]
            speaker=Arwen
            message= _ "Give me a moment to think, friend. You were right earlier, I have not confided enough in you about my own homeland."
        [/message]
        [message]
            speaker=Grunk
            message= _ "Don’t worry about it. Everyone has things they would rather keep private, and I’m no exception. I don’t want to sit here and reminisce over our pasts. We are still the same as ever, a pair of lone wolves."
        [/message]
        [message]
            speaker=Arwen
            message= _ "That we may be, but I must tell you... my homeland is Greenwood, the same as this girl’s. If I am to trust what she said earlier, then it seems that Greenwood is now being invaded by the undead."
        [/message]
        [message]
            speaker=Grunk
            message= _ "That’s quite the coincidence."
        [/message]
        [message]
            speaker=Ellrea
            # wmllint: local spelling Wh-what
            message= _ "Wh-what? You’re lying! There’s no way someone as barbaric as you could have been raised in Greenwood!"
        [/message]
        [message]
            speaker=Arwen
            message= _ "I am not thrilled to divulge such a secret! Had you not crossed my path, your cherished forest would have remained a place with which I had no further bond."
        [/message]
    [/event]

    # Timeout warning
    [event]
        name=turn 13
        [message]
            speaker=Ellrea
            message= _ "Even in spring, why is it so cold here?"
        [/message]
        [message]
            speaker=Grunk
            message= _ "Do you not know how cold these highlands can get? Well either way, it’s been a while since we’ve seen this much snow, we better hurry."
        [/message]
    [/event]

    [event]
        name=time over
        [message]
            speaker=Grunk
            message= _ "Agh, my wolf is freezing to death! And the snow is piling ever higher. We were too slow..."
        [/message]
    [/event]
[/scenario]
