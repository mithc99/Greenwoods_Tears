#define RECALL_CHARACTER STATS X Y FACING
    [unit]
        side=1
        {STATS}
        x,y={X},{Y}
        facing={FACING}
    [/unit]
#enddef

#define RECALL_GRUNK X Y FACING
    {RECALL_CHARACTER {CHARACTER_STATS_GRUNK} {X} {Y} {FACING}}
#enddef

#define RECALL_ELLREA X Y FACING
    {RECALL_CHARACTER {CHARACTER_STATS_ELLREA} {X} {Y} {FACING}}
#enddef

#define RECALL_KALENZ X Y FACING
