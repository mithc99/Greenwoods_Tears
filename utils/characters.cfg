#textdomain wesnoth-Greenwoods_Tears

#define PLAYER_TEAM
    team_name=player
#ifdef MULTIPLAYER
    user_team_name= _ "team_name^Player"
#else
    user_team_name= _ "team_name^Arwen"
#endif
    {FLAG_VARIANT6 ragged}
#enddef

#define PLAYABLE
    controller=human
    {PLAYER_TEAM}
    persistent=yes
    allow_player=yes
#ifdef MULTIPLAYER
    team_lock=yes
    gold_lock=yes
    income_lock=yes
    faction=Custom
    disallow_shuffle=yes
    share_vision=all
#endif
#enddef

#define UNPLAYABLE
    controller=ai
    disallow_observers=yes
    allow_player=no
#enddef

#define CHARACTER_STATS_ARWEN
    type=Elvish Rogue
    id=Arwen
    name= _ "Arwen"
    profile=portraits/arwen.webp
    unrenamable=yes
    canrecruit=yes
    extra_recruit=Saurian Augur,Footpad,Poacher,Thief,Wolf Rider
    [modifications]
        {TRAIT_RESILIENT}
        {TRAIT_STRONG}
        {TEAM_COLOR_OVERRIDE () brown}
    [/modifications]
#enddef

#define CHARACTER_STATS_GRUNK
    type=Wolf Rider
    id=Grunk
    name= _ "Grunk"
    profile=portraits/goblins/direwolver.webp
    unrenamable=yes
#ifdef MULTIPLAYER
    canrecruit=yes
    extra_recruit=Saurian Augur,Footpad,Poacher,Thief,Wolf Rider
#endif
    [modifications]
#ifndef MULTIPLAYER
        {TRAIT_LOYAL_HERO_NOSLOT}
#endif
        {TRAIT_FEARLESS}
        {TRAIT_INTELLIGENT}
        [object]
            [effect]
                [filter]
                    type=Wolf Rider
                [/filter]
                apply_to=remove_advancement
                types=Goblin Knight
            [/effect]
            [effect]
                [filter]
                    type=Goblin Pillager
                [/filter]
                apply_to=new_advancement
                replace=yes
                {GRUNK_ADVANCEMENTS}
            [/effect]
            [effect]
                [filter]
                    type=Goblin Pillager
                [/filter]
                apply_to=max_experience
                increase=-50
            [/effect]
        [/object]
    [/modifications]
#enddef

#define CHARACTER_STATS_ELLREA
    type=Elvish Maiden
    id=Ellrea
    name= _ "Ellrea"
    unrenamable=yes
    [modifications]
        {TRAIT_LOYAL_HERO_NOSLOT}
        {TRAIT_DEXTROUS}
        [trait]
            id=young
            male_name= _ "young"
            female_name= _ "female^young"
            [effect]
                apply_to=movement
                increase=1
            [/effect]
            [effect]
                apply_to=hitpoints
                increase_total=4
            [/effect]
            [effect]
                apply_to=hitpoints
                times=per level
                increase_total=1
            [/effect]
        [/trait]
    [/modifications]
#enddef

#define CHARACTER_STATS_KALENZ
